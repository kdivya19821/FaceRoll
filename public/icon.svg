<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c3ce0"/>
      <stop offset="100%" style="stop-color:#1e1e2f"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Decorative color dots -->
  <circle cx="80" cy="80" r="40" fill="#a78bfa" opacity="0.4"/>
  <circle cx="430" cy="100" r="50" fill="#38bdf8" opacity="0.35"/>
  <circle cx="100" cy="430" r="45" fill="#4ade80" opacity="0.35"/>
  <circle cx="420" cy="420" r="55" fill="#fbbf24" opacity="0.35"/>
  <circle cx="256" cy="80" r="25" fill="#38bdf8" opacity="0.2"/>
  <circle cx="60" cy="256" r="20" fill="#4ade80" opacity="0.2"/>
  <circle cx="450" cy="260" r="22" fill="#fbbf24" opacity="0.2"/>
  <!-- Center glow -->
  <circle cx="256" cy="220" r="120" fill="url(#eyeGlow)"/>
  <!-- Eye shape - outer almond -->
  <path d="M156 220 Q256 140, 356 220 Q256 300, 156 220Z" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Iris circle -->
  <circle cx="256" cy="220" r="42" fill="none" stroke="#38bdf8" stroke-width="3"/>
  <!-- Pupil -->
  <circle cx="256" cy="220" r="20" fill="white"/>
  <!-- Inner pupil dot -->
  <circle cx="256" cy="220" r="10" fill="#6c3ce0"/>
  <!-- Eye shine -->
  <circle cx="248" cy="212" r="5" fill="white" opacity="0.8"/>
  <!-- Colored iris details -->
  <circle cx="256" cy="220" r="35" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5" stroke-dasharray="6 10"/>
  <circle cx="256" cy="220" r="28" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="4 12"/>
  <!-- Scan pulse rings -->
  <circle cx="256" cy="220" r="70" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.25"/>
  <circle cx="256" cy="220" r="90" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.15"/>
  <circle cx="256" cy="220" r="110" fill="none" stroke="#4ade80" stroke-width="0.6" opacity="0.1"/>
  <!-- Scan corners around eye -->
  <g stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M165 165 L165 185 M165 165 L185 165"/>
    <path d="M347 165 L347 185 M347 165 L327 165"/>
    <path d="M165 275 L165 255 M165 275 L185 275"/>
    <path d="M347 275 L347 255 M347 275 L327 275"/>
  </g>
  <!-- App Name -->
  <text x="256" y="380" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="50" font-weight="800" letter-spacing="1">FaceRoll</text>
  <text x="256" y="415" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Arial,Helvetica,sans-serif" font-size="14" letter-spacing="5">SMART ATTENDANCE</text>
</svg>
